<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        /* 1. RESET & FONTS */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%); /* Fallback */
            background: linear-gradient(to bottom, #dbeafe, #eff6ff); /* Soft Blue Gradient */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            color: #1e293b;
        }

        /* 2. THE BACKGROUND '404' */
        .bg-text {
            position: absolute;
            font-size: 35vw;
            font-weight: 800;
            color: #ffffff;
            opacity: 0.6;
            z-index: 0;
            user-select: none;
            line-height: 1;
        }

        /* 3. THE CONTAINER */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }


        /* 5. TEXT STYLING */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #1e293b;
        }

        p {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 30px;
        }

        /* 6. BUTTON STYLING */
        .btn {
            background: white;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Navbar mimics */
        .nav-top { position: absolute; top: 20px; left: 20px; font-weight: bold; color: white; font-size: 1.2rem; }
        .nav-login { position: absolute; top: 20px; right: 20px; background: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; color: #333; }
        
    </style>
</head>
<body>

    
    <a href="#" class="nav-login">Log in</a>

    <div class="bg-text">404</div>

    <div class="content">
        
        
        <h1>Oops, I think we're lost...</h1>
        <p>Let's get you back to somewhere familiar.</p>
        
        <a href="/" class="btn">
            <span>←</span> Back Home
        </a>
    </div>

</body>
</html>
